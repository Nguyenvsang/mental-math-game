<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Math Master - Trò Chơi Tính Nhẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Lexend', sans-serif;
            touch-action: manipulation;
            transition: background-color 0.3s ease;
        }

        .math-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
            transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .number-btn {
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .number-btn:active {
            transform: scale(0.9);
            background-color: #4f46e5;
            color: white;
        }

        .progress-bar {
            transition: width 0.1s linear, background-color 0.3s ease;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }

        .combo-pulse {
            animation: pulse 0.5s cubic-bezier(0.4, 0, 0.6, 1) infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); opacity: 1; }
            50% { transform: scale(1.1); opacity: 0.8; }
        }

        .correct-flash {
            background-color: #dcfce7 !important;
        }

        .wrong-flash {
            background-color: #fee2e2 !important;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <!-- Start Screen -->
    <div id="start-screen" class="max-w-md w-full text-center p-8 math-card">
        <h1 class="text-4xl font-extrabold text-indigo-600 mb-2">Mental Math</h1>
        <p class="text-slate-500 mb-6">Rèn luyện trí não, phản xạ siêu tốc!</p>
        
        <div id="best-score-display" class="mb-8 text-sm font-semibold text-slate-400 uppercase tracking-widest">
            Kỷ lục của bạn: <span id="high-score" class="text-indigo-500">0</span>
        </div>
        
        <div class="space-y-4">
            <button onclick="startGame('easy')" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-bold shadow-lg transition-transform hover:scale-105 active:scale-95">
                DỄ (Cộng/Trừ 1-20)
            </button>
            <button onclick="startGame('medium')" class="w-full py-4 bg-yellow-500 hover:bg-yellow-600 text-white rounded-2xl font-bold shadow-lg transition-transform hover:scale-105 active:scale-95">
                TRUNG BÌNH (Cộng/Trừ/Nhân 1-50)
            </button>
            <button onclick="startGame('hard')" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-bold shadow-lg transition-transform hover:scale-105 active:scale-95">
                KHÓ (Hỗn hợp 1-100)
            </button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="max-w-md w-full hidden">
        <div id="main-card" class="math-card p-6 mb-4">
            <div class="flex justify-between items-center mb-6">
                <div class="flex flex-col">
                    <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Điểm số</span>
                    <div class="text-indigo-600 text-2xl font-black"><span id="score">0</span></div>
                </div>
                <div id="combo-container" class="hidden text-orange-500 font-black text-xl italic animate-bounce">
                    x<span id="combo">0</span> COMBO!
                </div>
                <div class="flex flex-col items-end">
                    <span class="text-xs text-slate-400 uppercase font-bold tracking-wider">Thời gian</span>
                    <div class="text-red-500 text-2xl font-black"><span id="timer">10</span>s</div>
                </div>
            </div>
            
            <div class="h-2 w-full bg-slate-100 rounded-full mb-8 overflow-hidden">
                <div id="progress" class="progress-bar h-full bg-indigo-500" style="width: 100%"></div>
            </div>

            <div id="question-container" class="text-center py-8">
                <div id="equation" class="text-5xl font-black text-slate-800 tracking-tighter transition-all duration-200">
                    --
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="grid grid-cols-3 gap-3">
            <button onclick="appendNum(1)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">1</button>
            <button onclick="appendNum(2)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">2</button>
            <button onclick="appendNum(3)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">3</button>
            <button onclick="appendNum(4)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">4</button>
            <button onclick="appendNum(5)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">5</button>
            <button onclick="appendNum(6)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">6</button>
            <button onclick="appendNum(7)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">7</button>
            <button onclick="appendNum(8)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">8</button>
            <button onclick="appendNum(9)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">9</button>
            <button onclick="clearNum()" class="number-btn bg-slate-200 p-5 rounded-2xl text-xl font-bold shadow-sm text-slate-600 hover:bg-slate-300">C</button>
            <button onclick="appendNum(0)" class="number-btn bg-white p-5 rounded-2xl text-2xl font-bold shadow-sm text-slate-700 hover:bg-slate-50">0</button>
            <button onclick="checkAnswer()" class="number-btn bg-indigo-600 p-5 rounded-2xl text-white text-xl font-bold shadow-lg hover:bg-indigo-700">OK</button>
        </div>
        
        <div id="user-input" class="mt-4 text-center text-4xl font-black text-indigo-600 min-h-[48px] tracking-widest">
            <!-- User input displays here -->
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="max-w-md w-full hidden text-center p-8 math-card">
        <h2 class="text-3xl font-bold text-slate-800 mb-2">Kết Thúc!</h2>
        <p class="text-slate-500 mb-6" id="result-message">Bạn đã rất cố gắng!</p>
        
        <div class="flex justify-center gap-8 mb-8">
            <div>
                <span class="text-xs text-slate-400 font-bold uppercase">Điểm đạt được</span>
                <div class="text-5xl font-black text-indigo-600" id="final-score">0</div>
            </div>
            <div id="new-record-tag" class="hidden">
                <span class="text-xs text-orange-500 font-bold uppercase">Kỷ lục mới!</span>
                <div class="text-5xl font-black text-orange-500">🏆</div>
            </div>
        </div>
        
        <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold shadow-lg transition-transform hover:scale-105 active:scale-95">
            CHƠI LẠI
        </button>
    </div>

    <script>
        // Audio Synthesis (No external files needed)
        const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
        function playTone(freq, type, duration) {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = type;
            osc.frequency.setValueAtTime(freq, audioCtx.currentTime);
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + duration);
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + duration);
        }

        let score = 0;
        let combo = 0;
        let timeLeft = 10;
        let currentAnswer = 0;
        let userInput = "";
        let timerInterval;
        let difficulty = 'easy';
        let maxTime = 10;

        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            result: document.getElementById('result-screen')
        };

        // Initialize High Score
        const savedHighScore = localStorage.getItem('mentalMathHighScore') || 0;
        document.getElementById('high-score').innerText = savedHighScore;

        function startGame(level) {
            difficulty = level;
            score = 0;
            combo = 0;
            maxTime = level === 'easy' ? 10 : (level === 'medium' ? 8 : 5);
            
            screens.start.classList.add('hidden');
            screens.game.classList.remove('hidden');
            
            nextQuestion();
            startTimer();
            playTone(440, 'sine', 0.2);
        }

        function nextQuestion() {
            userInput = "";
            updateInputDisplay();
            
            let num1, num2, operator;
            const ops = ['+', '-'];
            if (difficulty !== 'easy') ops.push('*');

            operator = ops[Math.floor(Math.random() * ops.length)];

            if (difficulty === 'easy') {
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 20) + 1;
            } else if (difficulty === 'medium') {
                num1 = Math.floor(Math.random() * 50) + 1;
                num2 = Math.floor(Math.random() * (operator === '*' ? 10 : 50)) + 1;
            } else {
                num1 = Math.floor(Math.random() * 100) + 1;
                num2 = Math.floor(Math.random() * (operator === '*' ? 15 : 100)) + 1;
            }

            if (operator === '-' && num1 < num2) [num1, num2] = [num2, num1];

            const eqEl = document.getElementById('equation');
            eqEl.style.opacity = 0;
            setTimeout(() => {
                eqEl.innerText = `${num1} ${operator === '*' ? '×' : operator} ${num2}`;
                eqEl.style.opacity = 1;
            }, 100);
            
            if (operator === '+') currentAnswer = num1 + num2;
            if (operator === '-') currentAnswer = num1 - num2;
            if (operator === '*') currentAnswer = num1 * num2;

            timeLeft = maxTime;
            updateProgress();
        }

        function appendNum(num) {
            if (userInput.length < 5) {
                userInput += num;
                updateInputDisplay();
                playTone(600 + (userInput.length * 100), 'sine', 0.05);
            }
        }

        function clearNum() {
            userInput = "";
            updateInputDisplay();
        }

        function updateInputDisplay() {
            document.getElementById('user-input').innerText = userInput || "_";
        }

        function checkAnswer() {
            const mainCard = document.getElementById('main-card');
            if (parseInt(userInput) === currentAnswer) {
                // Correct
                combo++;
                let pointsToAdd = 1 + Math.floor(combo / 5);
                score += pointsToAdd;
                
                document.getElementById('score').innerText = score;
                
                if (combo >= 3) {
                    const comboCont = document.getElementById('combo-container');
                    comboCont.classList.remove('hidden');
                    document.getElementById('combo').innerText = combo;
                }

                playTone(880, 'sine', 0.1);
                mainCard.classList.add('correct-flash');
                setTimeout(() => mainCard.classList.remove('correct-flash'), 200);
                
                nextQuestion();
            } else {
                // Wrong
                combo = 0;
                document.getElementById('combo-container').classList.add('hidden');
                
                playTone(220, 'sawtooth', 0.2);
                mainCard.classList.add('shake', 'wrong-flash');
                setTimeout(() => mainCard.classList.remove('shake', 'wrong-flash'), 200);
                
                userInput = "";
                updateInputDisplay();
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    gameOver();
                }
                updateProgress();
                document.getElementById('timer').innerText = Math.max(0, Math.ceil(timeLeft));
            }, 100);
        }

        function updateProgress() {
            const percent = (timeLeft / maxTime) * 100;
            const bar = document.getElementById('progress');
            bar.style.width = `${Math.max(0, percent)}%`;
            
            if (percent < 30) {
                bar.className = 'progress-bar h-full bg-red-500';
                if (Math.ceil(timeLeft) <= 3 && Math.floor(timeLeft * 10) % 10 === 0) {
                    playTone(330, 'square', 0.05);
                }
            } else {
                bar.className = 'progress-bar h-full bg-indigo-500';
            }
        }

        function gameOver() {
            clearInterval(timerInterval);
            screens.game.classList.add('hidden');
            screens.result.classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            // Handle High Score
            const currentHigh = parseInt(localStorage.getItem('mentalMathHighScore') || 0);
            if (score > currentHigh) {
                localStorage.setItem('mentalMathHighScore', score);
                document.getElementById('new-record-tag').classList.remove('hidden');
            }

            const msg = document.getElementById('result-message');
            if (score > 30) msg.innerText = "Tuyệt đỉnh! Bạn là máy tính sống!";
            else if (score > 15) msg.innerText = "Rất tốt! Cố gắng phá kỷ lục nhé.";
            else msg.innerText = "Không sao, luyện tập thêm chút nữa nhé!";
            
            playTone(440, 'sine', 0.1);
            setTimeout(() => playTone(330, 'sine', 0.3), 100);
        }

        document.addEventListener('keydown', (e) => {
            if (screens.game.classList.contains('hidden')) return;
            if (e.key >= '0' && e.key <= '9') appendNum(e.key);
            if (e.key === 'Backspace') clearNum();
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
