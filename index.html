<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mental Math Master - Trò Chơi Tính Nhẩm</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Lexend:wght@300;400;600;800&display=swap');
        
        body {
            font-family: 'Lexend', sans-serif;
            touch-action: manipulation;
        }

        .math-card {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border-radius: 2rem;
            box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1), 0 10px 10px -5px rgba(0, 0, 0, 0.04);
        }

        .number-btn {
            transition: all 0.1s ease;
            -webkit-tap-highlight-color: transparent;
        }

        .number-btn:active {
            transform: scale(0.9);
            background-color: #4f46e5;
            color: white;
        }

        .progress-bar {
            transition: width 0.1s linear;
        }

        @keyframes shake {
            0%, 100% { transform: translateX(0); }
            25% { transform: translateX(-5px); }
            75% { transform: translateX(5px); }
        }

        .shake {
            animation: shake 0.2s ease-in-out 0s 2;
        }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 overflow-hidden">

    <!-- Start Screen -->
    <div id="start-screen" class="max-w-md w-full text-center p-8 math-card">
        <h1 class="text-4xl font-extrabold text-indigo-600 mb-2">Mental Math</h1>
        <p class="text-slate-500 mb-8">Rèn luyện trí não, phản xạ siêu tốc!</p>
        
        <div class="space-y-4">
            <button onclick="startGame('easy')" class="w-full py-4 bg-green-500 hover:bg-green-600 text-white rounded-2xl font-bold shadow-lg transition-transform hover:scale-105">
                DỄ (Cộng/Trừ 1-20)
            </button>
            <button onclick="startGame('medium')" class="w-full py-4 bg-yellow-500 hover:bg-yellow-600 text-white rounded-2xl font-bold shadow-lg transition-transform hover:scale-105">
                TRUNG BÌNH (Cộng/Trừ/Nhân 1-50)
            </button>
            <button onclick="startGame('hard')" class="w-full py-4 bg-red-500 hover:bg-red-600 text-white rounded-2xl font-bold shadow-lg transition-transform hover:scale-105">
                KHÓ (Hỗn hợp 1-100)
            </button>
        </div>
    </div>

    <!-- Game Screen -->
    <div id="game-screen" class="max-w-md w-full hidden">
        <div class="math-card p-6 mb-4">
            <div class="flex justify-between items-center mb-6">
                <div class="text-indigo-600 font-bold">Điểm: <span id="score">0</span></div>
                <div class="text-red-500 font-bold">Thời gian: <span id="timer">10</span>s</div>
            </div>
            
            <div class="h-2 w-full bg-slate-100 rounded-full mb-8 overflow-hidden">
                <div id="progress" class="progress-bar h-full bg-indigo-500" style="width: 100%"></div>
            </div>

            <div id="question-container" class="text-center py-8">
                <div id="equation" class="text-5xl font-black text-slate-800 tracking-tighter transition-all">
                    12 + 5
                </div>
            </div>
        </div>

        <!-- Input Area -->
        <div class="grid grid-cols-3 gap-3">
            <button onclick="appendNum(1)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">1</button>
            <button onclick="appendNum(2)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">2</button>
            <button onclick="appendNum(3)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">3</button>
            <button onclick="appendNum(4)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">4</button>
            <button onclick="appendNum(5)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">5</button>
            <button onclick="appendNum(6)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">6</button>
            <button onclick="appendNum(7)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">7</button>
            <button onclick="appendNum(8)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">8</button>
            <button onclick="appendNum(9)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">9</button>
            <button onclick="clearNum()" class="number-btn bg-slate-200 p-6 rounded-2xl text-xl font-bold shadow-sm text-slate-600">C</button>
            <button onclick="appendNum(0)" class="number-btn bg-white p-6 rounded-2xl text-2xl font-bold shadow-sm text-slate-700">0</button>
            <button onclick="checkAnswer()" class="number-btn bg-indigo-600 p-6 rounded-2xl text-white text-xl font-bold shadow-lg">OK</button>
        </div>
        
        <div id="user-input" class="mt-4 text-center text-3xl font-bold text-indigo-600 min-h-[40px]">
            <!-- User input displays here -->
        </div>
    </div>

    <!-- Result Screen -->
    <div id="result-screen" class="max-w-md w-full hidden text-center p-8 math-card">
        <h2 class="text-3xl font-bold text-slate-800 mb-2">Kết Thúc!</h2>
        <p class="text-slate-500 mb-6" id="result-message">Bạn đã rất cố gắng!</p>
        
        <div class="text-6xl font-black text-indigo-600 mb-8" id="final-score">0</div>
        
        <button onclick="location.reload()" class="w-full py-4 bg-indigo-600 hover:bg-indigo-700 text-white rounded-2xl font-bold shadow-lg">
            CHƠI LẠI
        </button>
    </div>

    <script>
        let score = 0;
        let timeLeft = 10;
        let currentAnswer = 0;
        let userInput = "";
        let timerInterval;
        let difficulty = 'easy';
        let maxTime = 10;

        const screens = {
            start: document.getElementById('start-screen'),
            game: document.getElementById('game-screen'),
            result: document.getElementById('result-screen')
        };

        function startGame(level) {
            difficulty = level;
            score = 0;
            maxTime = level === 'easy' ? 10 : (level === 'medium' ? 8 : 5);
            
            screens.start.classList.add('hidden');
            screens.game.classList.remove('hidden');
            
            nextQuestion();
            startTimer();
        }

        function nextQuestion() {
            userInput = "";
            updateInputDisplay();
            
            let num1, num2, operator;
            const ops = ['+', '-'];
            if (difficulty !== 'easy') ops.push('*');

            operator = ops[Math.floor(Math.random() * ops.length)];

            if (difficulty === 'easy') {
                num1 = Math.floor(Math.random() * 20) + 1;
                num2 = Math.floor(Math.random() * 20) + 1;
            } else if (difficulty === 'medium') {
                num1 = Math.floor(Math.random() * 50) + 1;
                num2 = Math.floor(Math.random() * (operator === '*' ? 10 : 50)) + 1;
            } else {
                num1 = Math.floor(Math.random() * 100) + 1;
                num2 = Math.floor(Math.random() * (operator === '*' ? 15 : 100)) + 1;
            }

            if (operator === '-' && num1 < num2) [num1, num2] = [num2, num1];

            document.getElementById('equation').innerText = `${num1} ${operator === '*' ? '×' : operator} ${num2}`;
            
            if (operator === '+') currentAnswer = num1 + num2;
            if (operator === '-') currentAnswer = num1 - num2;
            if (operator === '*') currentAnswer = num1 * num2;

            timeLeft = maxTime;
            updateProgress();
        }

        function appendNum(num) {
            if (userInput.length < 5) {
                userInput += num;
                updateInputDisplay();
            }
        }

        function clearNum() {
            userInput = "";
            updateInputDisplay();
        }

        function updateInputDisplay() {
            document.getElementById('user-input').innerText = userInput;
        }

        function checkAnswer() {
            if (parseInt(userInput) === currentAnswer) {
                score++;
                document.getElementById('score').innerText = score;
                const eq = document.getElementById('equation');
                eq.classList.add('text-green-500');
                setTimeout(() => eq.classList.remove('text-green-500'), 200);
                nextQuestion();
            } else {
                const gameCard = document.querySelector('.math-card');
                gameCard.classList.add('shake');
                setTimeout(() => gameCard.classList.remove('shake'), 200);
                userInput = "";
                updateInputDisplay();
            }
        }

        function startTimer() {
            clearInterval(timerInterval);
            timerInterval = setInterval(() => {
                timeLeft -= 0.1;
                if (timeLeft <= 0) {
                    gameOver();
                }
                updateProgress();
                document.getElementById('timer').innerText = Math.max(0, Math.ceil(timeLeft));
            }, 100);
        }

        function updateProgress() {
            const percent = (timeLeft / maxTime) * 100;
            const bar = document.getElementById('progress');
            bar.style.width = `${Math.max(0, percent)}%`;
            
            if (percent < 30) {
                bar.className = 'progress-bar h-full bg-red-500';
            } else {
                bar.className = 'progress-bar h-full bg-indigo-500';
            }
        }

        function gameOver() {
            clearInterval(timerInterval);
            screens.game.classList.add('hidden');
            screens.result.classList.remove('hidden');
            document.getElementById('final-score').innerText = score;
            
            const msg = document.getElementById('result-message');
            if (score > 20) msg.innerText = "Tuyệt vời! Bạn là thiên tài toán học!";
            else if (score > 10) msg.innerText = "Rất tốt! Kỹ năng của bạn đang thăng tiến.";
            else msg.innerText = "Cố gắng lên! Luyện tập nhiều hơn nhé.";
        }

        document.addEventListener('keydown', (e) => {
            if (screens.game.classList.contains('hidden')) return;
            if (e.key >= '0' && e.key <= '9') appendNum(e.key);
            if (e.key === 'Backspace' || e.key === 'c') clearNum();
            if (e.key === 'Enter') checkAnswer();
        });
    </script>
</body>
</html>
